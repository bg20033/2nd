<main class="app-content">
  <app-header class="landing-header" [title]="'header.title' | t" />
  <section class="landing-frame">
    <section class="landing-intro">
      <div class="landing-avatar" aria-hidden="true">
        <img class="landing-avatar__image" src="assets/agenti.png" alt="" />
      </div>
      <article class="app-form-panel landing-card">
        @for (paragraph of introParagraphs; track paragraph) {
          <p>{{ paragraph | t }}</p>
        }
      </article>
    </section>
  </section>
  <app-footer [backDisabled]="true" [nextLabel]="'common.next' | t" (next)="startDeclaration()" />
</main>
