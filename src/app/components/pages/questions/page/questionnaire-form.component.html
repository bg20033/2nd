<app-questionnaire-topbar />

<main class="app-content" [class.app-content--review]="declaration.reviewMode()">
  <div class="grid min-w-0">
    @if (declaration.reviewMode()) {
      <app-review-panel (completed)="completeReview()" />
    } @else {
      <section
        class="app-form-panel"
        [class.border-[rgba(235,0,0,0.35)]]="validationAttempted()"
      >
        <form
          class="questionnaire grid min-w-0 gap-[0.65rem]"
          data-validation-scope="questionnaire"
          (submit)="submit(); $event.preventDefault()"
        >
          <app-medical-questions-section />
          <app-dental-questions-section />
        </form>
      </section>
    }
  </div>

  @if (!declaration.reviewMode()) {
    <app-footer
      [backLabel]="'common.back' | t"
      [nextLabel]="footerNextLabel()"
      [nextDisabled]="nextClickLocked()"
      (back)="goBack()"
      (next)="submit()"
    />
  }
</main>
