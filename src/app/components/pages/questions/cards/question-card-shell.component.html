<section
  class="question-card grid min-w-0 scroll-mt-40 gap-[0.6rem] py-0.5"
  [class.question-card--disabled]="disabled()"
  [class.opacity-[0.62]]="disabled()"
  data-validation-card
>
  <div class="flex min-w-0 flex-wrap items-start justify-between gap-[0.45rem]">
    @if (number()) {
      <span class="hidden">{{ number() }}</span>
    }
    <div>
      <h2 class="m-0 wrap-break-word text-[14px] font-normal leading-[1.22] tracking-normal text-[#050307]">
        @if (number()) {
          {{ number() }}.
        }
        {{ title() }}
      </h2>
          @if (description()) {
            <p class="mt-2 text-[12px] leading-[1.18] text-[#706876]">{{ description() }}</p>
          }
    </div>
  </div>

  <div class="grid gap-[0.6rem]">
    <ng-content />
  </div>
</section>
