<div class="diagnosis-panel grid min-w-0 gap-[0.8rem] pt-[0.15rem]" data-validation-card>
  <div class="grid min-w-0 gap-[1.2rem]">
    @for (entry of entries(); track entry.controls.id.value; let i = $index) {
      <app-diagnosis-entry
        [formService]="formService()"
        [entry]="entry"
        [index]="i"
        [canRemove]="i > 0"
        [variant]="variant()"
        (remove)="removeEntry($event)"
      />
    }

    @if (minDiagnosisError()) {
      <p class="field-error font-bold" data-validation-anchor>At least one diagnosis entry is required.</p>
    }

    @if (!disabled()) {
      <button
        type="button"
        class="h-(--control-height) w-full cursor-pointer rounded-lg border-0 bg-linear-to-r from-[#6e27de] to-[#8f2ef6] px-4 text-sm font-semibold text-white transition hover:-translate-y-px hover:shadow-[0_18px_28px_rgba(111,39,222,0.22)]"
        (click)="addEntry()"
      >
        {{ addButtonLabel() }}
      </button>
    }
  </div>
</div>
