@switch (step()) {
  @case ('questions') {
    <app-questionnaire-form (back)="openFamilyConfig()" (completed)="openLanding()" />
  }
  @case ('family') {
    <app-family-config (back)="openLanding()" (next)="openQuestionnaire()" />
  }
  @default {
    <app-landing (start)="openFamilyConfig()" />
  }
}
